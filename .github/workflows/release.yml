name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS universal dmg
            args: "--target universal-apple-darwin --bundles dmg"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-2022
            label: Windows x64 msi
            args: "--bundles msi"
            rustTargets: ""
          - platform: ubuntu-22.04
            label: Linux x64 AppImage
            args: "--bundles appimage"
            rustTargets: ""

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "miclaw_api_bridge ${{ github.ref_name }}"
          releaseBody: "Draft release generated by GitHub Actions. Assets include macOS dmg, Windows MSI, and Linux AppImage builds."
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
          args: ${{ matrix.args }}
