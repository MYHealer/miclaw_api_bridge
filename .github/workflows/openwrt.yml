name: OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build OpenWrt bundle (mipsel-musl)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TARGET: mipsel-unknown-linux-musl
      PKG_ARCH: mipsel_24kc
      ZIG_VER: 0.13.0

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install nightly Rust (with rust-src)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rust-src

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" | sudo tar -xJ -C /usr/local
          echo "/usr/local/zig-linux-x86_64-${ZIG_VER}" >> "$GITHUB_PATH"

      - name: Create Zig linker wrapper
        run: |
          echo '#!/bin/sh' > /tmp/mipsel-linker
          echo 'exec zig cc -target mipsel-linux-musl "$@"' >> /tmp/mipsel-linker
          chmod +x /tmp/mipsel-linker

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      - name: Cross-compile server binary
        run: |
          set -euo pipefail
          cd src-tauri
          export CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER=/tmp/mipsel-linker
          cargo +nightly build -Z build-std \
            --release --no-default-features \
            --target "$TARGET" --bin miclaw_api_bridge

      - name: Stage + strip binary
        id: bin
        run: |
          set -euo pipefail
          mkdir -p openwrt/out
          BIN="src-tauri/target/$TARGET/release/miclaw_api_bridge"
          cp -f "$BIN" openwrt/out/miclaw_api_bridge
          zig objcopy --strip-all openwrt/out/miclaw_api_bridge openwrt/out/miclaw_api_bridge.stripped 2>/dev/null && \
            mv openwrt/out/miclaw_api_bridge.stripped openwrt/out/miclaw_api_bridge || true
          file openwrt/out/miclaw_api_bridge || true

      - name: Pack deployable bundle
        run: |
          set -euo pipefail
          NAME="miclaw_api_bridge_${GITHUB_REF_NAME}_openwrt_mipsel.tar.gz"
          echo "BUNDLE=$NAME" >> "$GITHUB_ENV"
          bash openwrt/pack-bundle.sh openwrt/out/miclaw_api_bridge "openwrt/out/$NAME"

      - name: Build opkg ipk
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          [ "$ver" = "$GITHUB_REF_NAME" ] && ver="0.0.0-dev"
          IPK="luci-app-miclaw_${ver}-1_${PKG_ARCH}.ipk"
          echo "IPK=$IPK" >> "$GITHUB_ENV"
          PKG_VERSION="$ver" PKG_ARCH="$PKG_ARCH" \
            bash openwrt/build-ipk.sh openwrt/out/miclaw_api_bridge "openwrt/out/$IPK"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-mipsel
          path: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
          if-no-files-found: error

      - name: Compute date version
        id: ver
        run: echo "date=$(TZ=Asia/Shanghai date +'%y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "miclaw_api_bridge ${{ github.ref_name }} (${{ steps.ver.outputs.date }})"
          body: "Draft release generated by GitHub Actions · build ${{ steps.ver.outputs.date }}."
          draft: true
          prerelease: false
          files: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
