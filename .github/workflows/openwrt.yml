name: OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build OpenWrt bundle (mipsel-musl)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TARGET: mipsel-unknown-linux-musl
      PKG_ARCH: mipsel_24kc
      BUILDER_IMAGE: miclaw-mipsel-builder

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      - name: Build cross-compile Docker image
        run: |
          docker build -t "$BUILDER_IMAGE" -f- . <<'DOCKERFILE'
        FROM rust:1.83-bookworm
        RUN apt-get update && apt-get install -y --no-install-recommends \
            ca-certificates pkg-config curl xz-utils \
            && rm -rf /var/lib/apt/lists/*
        RUN curl -L https://musl.cc/mipsel-linux-musl-cross.tgz \
            | tar -xJ -C /usr/local
        ENV PATH="/usr/local/mipsel-linux-musl-cross/bin:${PATH}"
        ENV CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER=mipsel-linux-musl-gcc
        ENV CC_mipsel_unknown_linux_musl=mipsel-linux-musl-gcc
        RUN rustup target add mipsel-unknown-linux-musl
        WORKDIR /app
        DOCKERFILE

      - name: Cross-compile server binary
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/app" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -w /app/src-tauri \
            "$BUILDER_IMAGE" \
            cargo build --release --no-default-features \
              --target "$TARGET" --bin miclaw_api_bridge

      - name: Stage + strip binary
        id: bin
        run: |
          set -euo pipefail
          mkdir -p openwrt/out
          BIN="src-tauri/target/$TARGET/release/miclaw_api_bridge"
          cp -f "$BIN" openwrt/out/miclaw_api_bridge
          docker run --rm -v "$PWD:/app" "$BUILDER_IMAGE" \
            mipsel-linux-musl-strip /app/openwrt/out/miclaw_api_bridge \
            || llvm-strip openwrt/out/miclaw_api_bridge || true
          file openwrt/out/miclaw_api_bridge || true

      - name: Pack deployable bundle
        run: |
          set -euo pipefail
          NAME="miclaw_api_bridge_${GITHUB_REF_NAME}_openwrt_mipsel.tar.gz"
          echo "BUNDLE=$NAME" >> "$GITHUB_ENV"
          bash openwrt/pack-bundle.sh openwrt/out/miclaw_api_bridge "openwrt/out/$NAME"

      - name: Build opkg ipk
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          [ "$ver" = "$GITHUB_REF_NAME" ] && ver="0.0.0-dev"
          IPK="luci-app-miclaw_${ver}-1_${PKG_ARCH}.ipk"
          echo "IPK=$IPK" >> "$GITHUB_ENV"
          PKG_VERSION="$ver" PKG_ARCH="$PKG_ARCH" \
            bash openwrt/build-ipk.sh openwrt/out/miclaw_api_bridge "openwrt/out/$IPK"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-mipsel
          path: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
          if-no-files-found: error

      - name: Compute date version
        id: ver
        run: echo "date=$(TZ=Asia/Shanghai date +'%y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "miclaw_api_bridge ${{ github.ref_name }} (${{ steps.ver.outputs.date }})"
          body: "Draft release generated by GitHub Actions · build ${{ steps.ver.outputs.date }}. Assets include headless CLI/server, desktop tray binaries, the OpenWrt LuCI bundle (tar.gz) and an opkg-installable .ipk."
          draft: true
          prerelease: false
          files: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
